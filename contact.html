<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | CardDealAlert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8002D; --gold: #F5A800;
      --dark: #0D0D0D; --dark2: #1A1A1A; --dark3: #252525;
      --white: #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--dark); color: var(--white); }
    header {
      background: var(--dark2);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Oswald', sans-serif; font-size: 20px; letter-spacing: 2px; text-decoration: none; color: var(--white); }
    .logo span { color: var(--red); }
    .back { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; }
    .back:hover { color: var(--gold); }
    .container { max-width: 600px; margin: 0 auto; padding: 60px 24px 80px; }
    h1 { font-family: 'Oswald', sans-serif; font-size: 36px; margin-bottom: 12px; }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 48px; line-height: 1.7; }
    .form-group { margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
    input, textarea, select {
      width: 100%;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      color: var(--white);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--gold); }
    textarea { height: 140px; resize: vertical; }
    select option { background: var(--dark3); }
    .submit-btn {
      width: 100%;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #B5001F; }
    .note { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 16px; text-align: center; line-height: 1.7; }
    footer { text-align: center; padding: 24px; font-size: 12px; color: rgba(255,255,255,0.2); border-top: 1px solid rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">CARD<span>DEAL</span>ALERT</a>
    <a class="back" href="index.html">← トップに戻る</a>
  </header>

  <div class="container">
    <h1>お問い合わせ</h1>
    <p class="subtitle">
      ご意見・ご要望・不具合報告など、お気軽にお問い合わせください。<br>
      通常3〜5営業日以内にご返答いたします。
    </p>

    <!-- Google Forms等に差し替え推奨 -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="form-group">
        <label for="category">お問い合わせ種別</label>
        <select id="category" name="category">
          <option value="">選択してください</option>
          <option value="bug">不具合・バグ報告</option>
          <option value="feature">機能リクエスト</option>
          <option value="notification">通知に関するご質問</option>
          <option value="affiliate">アフィリエイト・広告について</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス（返信先）</label>
        <input type="email" id="email" name="email" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="message">お問い合わせ内容</label>
        <textarea id="message" name="message" placeholder="ご不明な点やご意見をお聞かせください..."></textarea>
      </div>

      <button type="submit" class="submit-btn">送信する</button>
      <p class="note">
        ※ Google Playのレビュー欄からもフィードバックをお送りいただけます。<br>
        ※ 個人情報はお問い合わせへの返答目的のみに使用します。
      </p>
    </form>
  </div>

  <footer>© 2025 CardDealAlert. All rights reserved.</footer>
</body>
</html>
